@if (movies.length > 0) {
  <div id="posterCarousel__div__root" class="relative rounded-2xl overflow-hidden shadow-lg bg-slate-900"
       [class.h-56]="size === 'sm'"
       [class.h-72]="size === 'md'"
       [class.sm:h-80]="size === 'md'"
       [class.md:h-96]="size === 'md'">
    @for (m of movies; track m.id; let i = $index) {
      <div [id]="'posterCarousel__div__slide_' + i" class="absolute inset-0 transition-opacity duration-700"
           [class.opacity-100]="i === currentIndex()"
           [class.opacity-0]="i !== currentIndex()"
           [class.pointer-events-none]="i !== currentIndex()">
        <img [id]="'posterCarousel__img__background_' + i" [src]="m.posterUrl" [alt]="m.title"
             class="absolute inset-0 w-full h-full object-cover scale-110 blur-sm opacity-40" />
        <div [id]="'posterCarousel__div__gradient_' + i" class="absolute inset-0 bg-gradient-to-r from-slate-900/95 via-slate-900/70 to-transparent"></div>

        <div [id]="'posterCarousel__div__content_' + i" class="relative h-full flex items-center px-6 sm:px-10 gap-6 sm:gap-10">
          <img [id]="'posterCarousel__img__poster_' + i" [src]="m.posterUrl" [alt]="m.title"
               class="hidden sm:block w-auto rounded-lg shadow-2xl ring-1 ring-white/10"
               [class.h-40]="size === 'sm'"
               [class.h-56]="size === 'md'"
               [class.md:h-72]="size === 'md'" />
          <div [id]="'posterCarousel__div__text_' + i" class="text-white max-w-xl">
            <div [id]="'posterCarousel__div__kicker_' + i" class="text-xs uppercase tracking-widest text-indigo-300 mb-2">{{ kicker }}</div>
            <h2 [id]="'posterCarousel__h2__title_' + i" class="font-bold leading-tight"
                [class.text-xl]="size === 'sm'"
                [class.text-2xl]="size === 'md'"
                [class.sm:text-3xl]="size === 'md'"
                [class.md:text-4xl]="size === 'md'">{{ m.title }}</h2>
            <p [id]="'posterCarousel__p__meta_' + i" class="text-sm sm:text-base text-slate-200 mt-2">
              {{ m.genre }} · {{ m.durationMins }} min
            </p>
            @if (enableBookingCta) {
              <a [id]="'posterCarousel__a__book_' + i" [routerLink]="['/movies', m.id, 'book']"
                 class="inline-flex items-center mt-5 rounded-lg bg-indigo-600 hover:bg-indigo-700 px-5 py-2.5 text-sm font-semibold text-white shadow transition">
                Book Tickets →
              </a>
            }
          </div>
        </div>
      </div>
    }

    @if (movies.length > 1) {
      <button type="button" id="posterCarousel__button__prev" name="posterCarousel__button__prev" (click)="prev()"
              class="absolute left-3 top-1/2 -translate-y-1/2 z-10 h-10 w-10 rounded-full bg-black/40 hover:bg-black/60 text-white flex items-center justify-center backdrop-blur-sm transition"
              aria-label="Previous">‹</button>
      <button type="button" id="posterCarousel__button__next" name="posterCarousel__button__next" (click)="next()"
              class="absolute right-3 top-1/2 -translate-y-1/2 z-10 h-10 w-10 rounded-full bg-black/40 hover:bg-black/60 text-white flex items-center justify-center backdrop-blur-sm transition"
              aria-label="Next">›</button>

      <div id="posterCarousel__div__dots" class="absolute bottom-4 left-1/2 -translate-x-1/2 z-10 flex gap-2">
        @for (m of movies; track m.id; let i = $index) {
          <button type="button" [id]="'posterCarousel__button__dot_' + i" [name]="'posterCarousel__button__dot_' + i" (click)="goTo(i)"
                  [ngClass]="i === currentIndex() ? 'bg-white' : 'bg-white/40'"
                  class="h-2 w-2 rounded-full transition"></button>
        }
      </div>
    }
  </div>
}
