# Server
server.port=8181

# MySQL DataSource
spring.datasource.url=jdbc:mysql://localhost:3306/movie_booking?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=938145
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Run schema.sql after Hibernate creates tables (loads seed data)
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
spring.jpa.defer-datasource-initialization=true

# JWT
# Base64-encoded HMAC-SHA256 secret (32+ bytes when decoded). Override in production via env var APP_JWT_SECRET.
app.jwt.secret=${APP_JWT_SECRET:Y2luZWJvb2stZGV2LWp3dC1zZWNyZXQta2V5LXBsZWFzZS1jaGFuZ2UtaW4tcHJvZHVjdGlvbg==}
app.jwt.expiration-ms=86400000

# Logging
logging.level.com.movieapp=INFO
